<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T-014a Debug Validation</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-900 p-6">
    <h1 class="text-2xl font-semibold mb-2">T-014a Debug Validation</h1>
    <p class="text-sm text-slate-600 mb-4">Development-only validation tab. Configure league settings, load/import players, then run golden comparison.</p>

    <div class="space-y-6">
      <details open class="border rounded">
        <summary class="px-3 py-2 font-medium cursor-pointer select-none">Live Data Explorer (dev)</summary>
        <div class="p-3 pt-0 space-y-2">
          <div class="flex items-center gap-2">
            <label class="text-sm">Dataset
              <select id="dataKey" class="border p-1 ml-1">
                <option value="workspace::players">workspace::players</option>
                <option value="workspace::state">workspace::state</option>
                <option value="debug::analysis_table">debug::analysis_table</option>
              </select>
            </label>
            <button id="refreshData" class="px-3 py-1 rounded bg-slate-600 text-white">Refresh</button>
            <button id="exportCsv" class="px-3 py-1 rounded bg-emerald-600 text-white">Export CSV</button>
            <span id="dataStatus" class="text-xs text-slate-600"></span>
          </div>
          <div class="max-h-96 overflow-auto">
            <table id="dataTable" class="min-w-full bg-white rounded border text-xs">
              <thead class="bg-slate-100"></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </details>

      <details open class="border rounded">
        <summary class="px-3 py-2 font-medium cursor-pointer select-none">League Settings</summary>
        <div class="p-3 pt-0">
          <iframe src="./T-012_settings.html" class="w-full h-96 border rounded"></iframe>
        </div>
      </details>

      <details open class="border rounded">
        <summary class="px-3 py-2 font-medium cursor-pointer select-none">Data Management</summary>
        <div class="p-3 pt-0">
          <iframe src="./T-013_data_management.html" class="w-full h-96 border rounded"></iframe>
        </div>
      </details>

      <details open class="border rounded">
        <summary class="px-3 py-2 font-medium cursor-pointer select-none">Golden & Validation</summary>
        <div class="p-3 pt-0 space-y-3">
          <div class="space-x-2">
            <button id="loadGolden" class="px-3 py-2 rounded bg-slate-600 text-white">Load Golden Data</button>
            <label>Tolerance (%) <input id="tolerance" type="number" step="0.1" value="1.0" class="border p-1 w-24"></label>
            <button id="run" class="px-3 py-2 rounded bg-blue-600 text-white">Run Validation</button>
            <button id="exportMd" class="px-3 py-2 rounded bg-emerald-600 text-white">Export Markdown</button>
            <button id="useGoldenAsCurrent" class="px-3 py-2 rounded bg-amber-600 text-white">Use Golden as Current</button>
          </div>
          <div class="text-xs text-slate-600">Status: Current <span id="curCount">0</span> rows, Golden <span id="goldCount">0</span> rows</div>
          <div id="summary" class="text-sm"></div>
          <div class="max-h-96 overflow-auto">
            <table id="results" class="min-w-full bg-white rounded border text-sm">
              <thead class="bg-slate-100"><tr><th class="text-left p-2">name</th><th class="text-left p-2">PtsΔ</th><th class="text-left p-2">VBDΔ</th><th class="text-left p-2">within</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
          <div>
            <h3 class="font-medium">Missing</h3>
            <pre id="missing" class="bg-white border rounded p-2 text-xs"></pre>
          </div>
        </div>
      </details>

    </div>

    <script type="module">
      import { createStorageAdapter, createBackupManager } from '/src/adapters/storage.js';
      import { loadSettings } from '/src/ui/settings.js';
      import { loadPlayersFromWorkspace, savePlayersToWorkspace } from '/src/ui/dataManagement.js';
      import { autoConfigure, calculatePoints } from '/src/core/scoring.js';
      import { calculatePlayerVBD } from '/src/core/vbd.js';

      const store = createStorageAdapter({ namespace: 'workspace', version: '1.0.0' });
      const tbody = document.querySelector('#results tbody');
      const summaryEl = document.getElementById('summary');
      const missingEl = document.getElementById('missing');

      let golden = [];
      let lastResults = null;
      const curCountEl = document.getElementById('curCount');
      const goldCountEl = document.getElementById('goldCount');
      const runBtn = document.getElementById('run');

      function refreshCounts() {
        const cur = loadPlayersFromWorkspace() || [];
        curCountEl.textContent = String(cur.length);
        goldCountEl.textContent = String(golden.length || 0);
        runBtn.disabled = (cur.length === 0 || (golden.length || 0) === 0);
        runBtn.classList.toggle('opacity-50', runBtn.disabled);
      }

      // Auto-backup helper for this page (workspace players only)
      const backups = createBackupManager(store, { maxBackups: 3 });
      function backupWorkspacePlayers(note = '') {
        try {
          const players = loadPlayersFromWorkspace() || [];
          const snap = { version: store.getVersion ? store.getVersion() : '1.0.0', timestamp: Date.now(), note, state: { players } };
          snap.size = JSON.stringify(snap.state).length;
          backups.save(snap);
        } catch {}
      }

      document.getElementById('loadGolden').addEventListener('click', async () => {
        const text = await fetch('../../testdata/golden/debug_validation_set.csv').then(r => r.text());
        golden = parseCsvToObjects(text);
        alert(`Loaded golden: ${golden.length} rows`);
        refreshCounts();
        backupWorkspacePlayers('afterLoadGolden');
      });

      document.getElementById('run').addEventListener('click', () => {
        const tolPct = Number(document.getElementById('tolerance').value || 1.0);
        const tolerance = tolPct / 100.0;
        const settings = loadSettings();
        const players = loadPlayersFromWorkspace();
        const scoring = autoConfigure(settings.scoringPreset, settings.scoringOverrides);

        // Compute points for current players if they have stat columns; otherwise assume points present
        const current = players.map(p => ({ ...p, points: Number(p.points) || Number(p.pts) || 0 }));
        const currentByName = Object.fromEntries(current.map(p => [p.name, p]));

        const goldenWithPoints = golden.map(g => {
          const pts = Number(g.expected_points_ppr) || calculatePoints(g, scoring);
          return { ...g, points: pts };
        });

        const leagueSettings = { teams: settings.teams, starters: settings.roster };
        const curWithVbd = calculatePlayerVBD(current, leagueSettings);
        const goldWithVbd = calculatePlayerVBD(goldenWithPoints, leagueSettings);

        const goldByName = Object.fromEntries(goldWithVbd.map(p => [p.name, p]));
        const rows = [];
        const missing = [];
        let sumAbsPctPts = 0;
        let sumAbsPctVbd = 0;

        for (const g of goldenWithPoints) {
          const c = currentByName[g.name];
          if (!c) { missing.push(g.name); continue; }
          const gv = goldByName[g.name]?.vbd ?? 0;
          const cv = curWithVbd.find(p => p.name === g.name)?.vbd ?? 0;
          const ptsDelta = Math.abs((c.points || 0) - (g.points || 0));
          const vbdDelta = Math.abs(cv - gv);
          const within = (ptsDelta / Math.max(1, g.points || 1)) <= tolerance && (vbdDelta / Math.max(1, Math.abs(gv) || 1)) <= tolerance;
          rows.push({ name: g.name, ptsDelta, vbdDelta, within });
          // accumulate percentage errors (MAPE components)
          sumAbsPctPts += (ptsDelta / Math.max(1, Math.abs(g.points || 1)));
          sumAbsPctVbd += (Math.abs(vbdDelta) / Math.max(1, Math.abs(gv) || 1));
        }

        const maePts = rows.reduce((a, r) => a + r.ptsDelta, 0) / (rows.length || 1);
        const maeVbd = rows.reduce((a, r) => a + r.vbdDelta, 0) / (rows.length || 1);
        const withinPct = rows.length ? (rows.filter(r => r.within).length / rows.length) * 100 : 0;
        const maePtsPct = rows.length ? (sumAbsPctPts / rows.length) * 100 : 0;
        const maeVbdPct = rows.length ? (sumAbsPctVbd / rows.length) * 100 : 0;

        renderTable(rows);
        summaryEl.textContent = JSON.stringify({ count: rows.length, tolerancePct: tolPct, maePts: round(maePts,2), maeVbd: round(maeVbd,2), maePtsPct: round(maePtsPct,2), maeVbdPct: round(maeVbdPct,2), withinPct: round(withinPct,1) }, null, 2);
        missingEl.textContent = missing.join('\n');
        lastResults = { rows, maePts, maeVbd, maePtsPct, maeVbdPct, withinPct, missing, tolerance: tolPct };
      });

      document.getElementById('exportMd').addEventListener('click', () => {
        if (!lastResults) { alert('Run validation first'); return; }
        const md = toMarkdown(lastResults);
        const blob = new Blob([md], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `debug_validation_${Date.now()}.md`; a.click();
        URL.revokeObjectURL(url);
      });

      // Convenience: overwrite workspace players with golden points for quick validation
      document.getElementById('useGoldenAsCurrent').addEventListener('click', () => {
        if (!golden.length) { alert('Load golden first'); return; }
        const settings = loadSettings();
        const scoring = autoConfigure(settings.scoringPreset, settings.scoringOverrides);
        const rows = golden.map(g => ({
          name: g.name,
          team: g.team,
          position: g.position,
          points: (Number(g.expected_points_ppr) || calculatePoints(g, scoring))
        }));
        const res = savePlayersToWorkspace(rows);
        if (!res.ok) { alert('Failed to save to workspace'); return; }
        alert(`Workspace updated with ${rows.length} golden rows`);
        refreshCounts();
        backupWorkspacePlayers('afterUseGoldenAsCurrent');
      });

      // Initial counts
      refreshCounts();

      function renderTable(rows) {
        tbody.innerHTML = '';
        for (const r of rows) {
          const tr = document.createElement('tr');
          const within = r.within ? 'text-emerald-700' : 'text-rose-700';
          tr.innerHTML = `<td class="p-2 border-t">${r.name}</td><td class="p-2 border-t">${r.ptsDelta.toFixed(2)}</td><td class="p-2 border-t">${r.vbdDelta.toFixed(2)}</td><td class="p-2 border-t ${within}">${r.within ? '✓' : '✗'}</td>`;
          tbody.appendChild(tr);
        }
      }

      function toMarkdown(res) {
        const lines = [];
        lines.push(`# Debug Validation Report`);
        lines.push('');
        lines.push(`Tolerance: ${res.tolerance}%`);
        lines.push(`Count: ${res.rows.length}`);
        lines.push(`MAE Points: ${round(res.maePts,2)}`);
        lines.push(`MAE VBD: ${round(res.maeVbd,2)}`);
        lines.push(`MAE Points %: ${round(res.maePtsPct,2)}%`);
        lines.push(`MAE VBD %: ${round(res.maeVbdPct,2)}%`);
        lines.push(`Within Tolerance: ${round(res.withinPct,1)}%`);
        lines.push('');
        lines.push('| Player | PtsΔ | VBDΔ | Within |');
        lines.push('|---|---:|---:|:---:|');
        for (const r of res.rows) lines.push(`| ${r.name} | ${r.ptsDelta.toFixed(2)} | ${r.vbdDelta.toFixed(2)} | ${r.within ? '✓' : '✗'} |`);
        if (res.missing.length) {
          lines.push('');
          lines.push('## Missing in Current Data');
          for (const m of res.missing) lines.push(`- ${m}`);
        }
        lines.push('');
        lines.push('> Generated by T-014a Debug Validator');
        return lines.join('\n');
      }

      function parseCsvToObjects(text) {
        const [headerLine, ...lines] = text.trim().split(/\r?\n/);
        const header = headerLine.split(',');
        return lines.filter(Boolean).map(line => {
          const vals = splitCsvLine(line);
          const obj = {};
          for (let i = 0; i < header.length; i += 1) obj[header[i]] = vals[i];
          return obj;
        });
      }

      function splitCsvLine(line) {
        const res = []; let i = 0; let cur=''; let inQ=false;
        while (i < line.length) {
          const ch = line[i];
          if (inQ) {
            if (ch === '"' && line[i+1] === '"') { cur += '"'; i += 2; continue; }
            if (ch === '"') { inQ = false; i += 1; continue; }
            cur += ch; i += 1; continue;
          } else {
            if (ch === '"') { inQ = true; i += 1; continue; }
            if (ch === ',') { res.push(cur); cur=''; i += 1; continue; }
            cur += ch; i += 1; continue;
          }
        }
        res.push(cur); return res;
      }

      function round(n, d=1) { const p = 10**d; return Math.round(n*p)/p; }

      // ===== Live Data Explorer =====
      function toArrayLike(value) {
        if (Array.isArray(value)) return value;
        if (value && typeof value === 'object' && Array.isArray(value.picks)) return value.picks;
        return [];
      }
      function renderTableFromArray(arr) {
        const thead = document.querySelector('#dataTable thead');
        const tbody = document.querySelector('#dataTable tbody');
        thead.innerHTML = ''; tbody.innerHTML = '';
        if (!Array.isArray(arr) || arr.length === 0) return;
        const cols = Array.from(new Set(arr.flatMap(row => Object.keys(row))));
        const trh = document.createElement('tr');
        cols.forEach(k => { const th = document.createElement('th'); th.className='text-left p-2'; th.textContent = k; trh.appendChild(th); });
        thead.appendChild(trh);
        arr.forEach(row => {
          const tr = document.createElement('tr');
          cols.forEach(k => { const td=document.createElement('td'); td.className='p-2 border-t'; td.textContent = String(row[k] ?? ''); tr.appendChild(td); });
          tbody.appendChild(tr);
        });
      }
      function refreshExplorer() {
        const key = document.getElementById('dataKey').value;
        const raw = window.localStorage.getItem(key);
        const parsed = raw ? JSON.parse(raw) : (key.endsWith('players') ? [] : {});
        const arr = toArrayLike(parsed);
        renderTableFromArray(arr);
        document.getElementById('dataStatus').textContent = `rows: ${arr.length}`;
        return { key, arr };
      }
      document.getElementById('refreshData').addEventListener('click', refreshExplorer);
      document.getElementById('exportCsv').addEventListener('click', () => {
        const { key, arr } = refreshExplorer();
        if (!arr.length) { alert('No rows to export'); return; }
        const cols = Array.from(new Set(arr.flatMap(row => Object.keys(row))));
        const lines = [cols.join(',')];
        arr.forEach(row => lines.push(cols.map(k => String(row[k] ?? '')).join(',')));
        const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${key.replace(/[:]/g,'_')}.csv`; a.click();
        URL.revokeObjectURL(url);
      });
      // Initial render
      refreshExplorer();
    </script>
  </body>
  </html>
