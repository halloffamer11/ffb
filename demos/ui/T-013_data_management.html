<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T-013 Data Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom styles for sticky header in scrollable container */
      .table-container {
        height: calc(100vh - 200px);
        overflow: auto;
        position: relative;
      }
      .table-container thead th {
        position: sticky;
        top: 0;
        z-index: 10;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 p-6">
    <h1 class="text-2xl font-semibold mb-3">Data Management</h1>

    <!-- Fixed Controls Section -->
    <div class="space-y-3 mb-4">
      <div class="flex items-center gap-2 flex-wrap">
        <input id="fileInput" type="file" accept=".csv,text/csv" class="border rounded p-2" />
        <button id="loadBtn" class="px-3 py-2 rounded bg-slate-600 text-white hover:bg-slate-700">Load</button>
        <button id="saveBtn" class="px-3 py-2 rounded bg-blue-600 text-white hover:bg-blue-700">Save to Workspace</button>
        <button id="exportBtn" class="px-3 py-2 rounded bg-emerald-600 text-white hover:bg-emerald-700">Export CSV</button>
        <span class="text-sm text-slate-600">Source: <span id="sourceLabel">workspace</span></span>
      </div>
      <div class="flex items-center gap-2">
        <label class="inline-flex items-center gap-1"><input id="selectAll" type="checkbox" /> Select All</label>
        <button id="deleteSelected" class="px-2 py-1 border rounded text-rose-700 hover:text-rose-800">Delete Selected</button>
      </div>
      <div id="errors" class="text-rose-600 whitespace-pre-wrap"></div>
    </div>

    <!-- Scrollable Table Container -->
    <div class="table-container border rounded bg-white">
      <table id="grid" class="min-w-full text-sm">
        <thead>
          <tr class="bg-slate-100 border-b">
            <th class="text-left p-2 w-8 bg-slate-100"></th>
            <th class="text-left p-2 bg-slate-100">Name</th>
            <th class="text-left p-2 bg-slate-100">Team</th>
            <th class="text-left p-2 bg-slate-100">Position</th>
            <th class="text-left p-2 bg-slate-100">Points</th>
            <th class="text-left p-2 bg-slate-100">Injury</th>
            <th class="text-left p-2 bg-slate-100">Source</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100"></tbody>
      </table>
    </div>

    <script type="module">
      import { loadPlayersFromFile, savePlayersToWorkspace, loadPlayersFromWorkspace, withSourceTag } from '/src/ui/dataManagement.js';
      import { normalizeInjuryStatus } from '/src/core/schema.js';
      
      function init() {
        const fileInput = document.getElementById('fileInput');
        const gridBody = document.querySelector('#grid tbody');
        const errors = document.getElementById('errors');
        let current = [];
        const STATUS_LABELS = ['HEALTHY','Q','D','O','IR','PUP','NA'];

        function codeToLabel(code) {
          const n = Number(code);
          if (Number.isFinite(n)) return STATUS_LABELS[n] ?? 'NA';
          const s = String(code || '').toUpperCase();
          return STATUS_LABELS.includes(s) ? s : 'NA';
        }

        function render(rows) {
          gridBody.innerHTML = '';
          for (const r of rows) {
            const globalIdx = current.indexOf(r);
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td class="p-2"><input type="checkbox" class="rowSel" /></td>
              <td class="p-2">${r.name || ''}</td>
              <td class="p-2">${r.team || ''}</td>
              <td class="p-2">${r.position || ''}</td>
              <td class="p-2">${r.points != null ? Number(r.points).toFixed(1) : ''}</td>
              <td class="p-2">
                <select class="injSel border rounded p-1 text-xs" data-idx="${globalIdx}">
                  ${STATUS_LABELS.map(label => 
                    `<option value="${label}" ${codeToLabel(r.injuryStatus) === label ? 'selected' : ''}>${label}</option>`
                  ).join('')}
                </select>
              </td>
              <td class="p-2 text-slate-500">${r.__source || ''}</td>`;
            gridBody.appendChild(tr);
          }
        }

        function clearErrors() { 
          errors.textContent = ''; 
        }
        
        function showError(msg) { 
          errors.textContent = msg; 
        }

        async function loadFromFile() {
          clearErrors();
          if (!fileInput.files?.length) {
            showError('Please select a file');
            return;
          }
          const file = fileInput.files[0];
          const result = await loadPlayersFromFile(file);
          if (!result.ok) {
            showError(`Load failed: ${result.error}`);
            return;
          }
          current = withSourceTag(result.data, 'imported');
          document.getElementById('sourceLabel').textContent = 'imported';
          render(current);
        }

        function loadFromWorkspace() {
          clearErrors();
          const players = loadPlayersFromWorkspace();
          if (!players) {
            showError('No players in workspace');
            current = [];
            render([]);
            return;
          }
          current = withSourceTag(players, 'workspace');
          document.getElementById('sourceLabel').textContent = 'workspace';
          render(current);
        }

        function saveToWorkspace() {
          clearErrors();
          if (!current.length) {
            showError('No data to save');
            return;
          }
          const cleaned = current.map(r => {
            const { __source, ...rest } = r;
            return rest;
          });
          const result = savePlayersToWorkspace(cleaned);
          if (!result.ok) {
            showError(`Save failed: ${result.error}`);
            return;
          }
          alert(`Saved ${cleaned.length} players to workspace`);
          document.getElementById('sourceLabel').textContent = 'workspace';
        }

        function exportCsv() {
          clearErrors();
          if (!current.length) {
            showError('No data to export');
            return;
          }
          const headers = ['name', 'team', 'position', 'points', 'injuryStatus'];
          const lines = [headers.join(',')];
          for (const r of current) {
            const row = headers.map(h => String(r[h] || ''));
            lines.push(row.join(','));
          }
          const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `players_${Date.now()}.csv`;
          a.click();
          URL.revokeObjectURL(url);
        }

        // Event listeners
        document.getElementById('loadBtn').addEventListener('click', loadFromFile);
        document.getElementById('saveBtn').addEventListener('click', saveToWorkspace);
        document.getElementById('exportBtn').addEventListener('click', exportCsv);
        
        document.getElementById('selectAll').addEventListener('change', (e) => {
          const checks = gridBody.querySelectorAll('.rowSel');
          checks.forEach(c => c.checked = e.target.checked);
        });

        document.getElementById('deleteSelected').addEventListener('click', () => {
          const checks = Array.from(gridBody.querySelectorAll('.rowSel'));
          const toDelete = new Set();
          checks.forEach((c, i) => {
            if (c.checked && current[i]) toDelete.add(current[i]);
          });
          if (toDelete.size === 0) return;
          current = current.filter(r => !toDelete.has(r));
          render(current);
        });

        gridBody.addEventListener('change', (e) => {
          if (e.target.classList.contains('injSel')) {
            const idx = Number(e.target.dataset.idx);
            if (idx >= 0 && idx < current.length) {
              const newStatus = normalizeInjuryStatus(e.target.value);
              current[idx].injuryStatus = newStatus;
            }
          }
        });

        // Load initial data
        loadFromWorkspace();
      }

      // Initialize when ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    </script>
  </body>
</html>
