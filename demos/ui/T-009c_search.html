<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T-009c Search Results UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      tr[aria-selected="true"] { outline: 2px solid #2563eb; background-color: #eff6ff; }
      mark { background: #fde68a; padding: 0 1px; border-radius: 2px; }
      /* Toggle switch styling */
      input.toggle {
        appearance: none;
        width: 2.5rem; /* 40px */
        height: 1.25rem; /* 20px */
        background: #cbd5e1; /* slate-300 */
        border-radius: 9999px;
        position: relative;
        outline: none;
        transition: background-color 0.2s ease;
      }
      input.toggle::after {
        content: '';
        position: absolute;
        top: 0.125rem; /* 2px */
        left: 0.125rem; /* 2px */
        width: 1rem; /* 16px */
        height: 1rem; /* 16px */
        background: #ffffff;
        border-radius: 9999px;
        box-shadow: 0 1px 2px rgba(0,0,0,0.15);
        transition: transform 0.2s ease;
      }
      input.toggle:checked { background: #10b981; /* emerald-500 */ }
      input.toggle:checked::after { transform: translateX(1.25rem); /* 20px */ }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 p-6">
    <h1 class="text-2xl font-semibold mb-2">T-009c Search Results UI</h1>
    <p class="text-sm text-slate-600 mb-4">Fuzzy search results with highlight, drafted styling, and keyboard navigation (↑/↓ to move, Enter to toggle drafted).</p>

    <div class="flex items-center gap-3 flex-wrap mb-2">
      <input id="q" type="text" placeholder="Type a name... (e.g., mah, travis, cj)" class="border p-2 w-[28rem]" />
      <div class="flex items-center gap-2">
        <span class="text-xs text-slate-600">Positions:</span>
        <label class="inline-flex items-center gap-1 text-xs"><input id="pos_all" type="checkbox" checked /> All</label>
        <label class="inline-flex items-center gap-1 text-xs"><input class="pos" data-pos="QB" type="checkbox" /> QB</label>
        <label class="inline-flex items-center gap-1 text-xs"><input class="pos" data-pos="RB" type="checkbox" /> RB</label>
        <label class="inline-flex items-center gap-1 text-xs"><input class="pos" data-pos="WR" type="checkbox" /> WR</label>
        <label class="inline-flex items-center gap-1 text-xs"><input class="pos" data-pos="TE" type="checkbox" /> TE</label>
        <label class="inline-flex items-center gap-1 text-xs"><input class="pos" data-pos="DST" type="checkbox" /> DST</label>
        <label class="inline-flex items-center gap-1 text-xs"><input class="pos" data-pos="K" type="checkbox" /> K</label>
      </div>
      <label class="inline-flex items-center gap-2 ml-2 text-xs">
        Show Drafted
        <input id="showDrafted" type="checkbox" class="toggle" />
      </label>
      <span class="text-sm text-slate-600">Results: <span id="count">0</span></span>
      <span class="text-sm text-slate-600">Time: <span id="time">0</span> ms</span>
      <span id="perfHud" class="text-xs text-slate-500 hidden"> | Avg: <span id="hudAvg">-</span> ms, p95: <span id="hudP95">-</span> ms <button id="hudReset" class="ml-1 underline">reset</button></span>
      <button id="reload" class="ml-auto px-3 py-2 rounded bg-slate-600 text-white">Reload Workspace</button>
      <button id="resetDraft" class="px-3 py-2 rounded bg-rose-600 text-white" title="Dev-only: clears picks and drafted flags">Reset Draft (dev)</button>
      <button id="runCalcs" class="px-3 py-2 rounded bg-amber-600 text-white" title="Dev-only: compute analysis for all players">Run Calcs (dev)</button>
      <a href="./T-013_data_management.html" class="px-3 py-2 rounded bg-amber-600 text-white" target="_blank">Open T-013</a>
    </div>

    <div id="notice" class="text-amber-700 text-sm mb-3"></div>

      <table class="min-w-full bg-white rounded border text-sm">
      <thead class="bg-slate-100">
        <tr>
          <th class="text-left p-2">name</th>
          <th class="text-left p-2">team</th>
          <th class="text-left p-2">pos</th>
          <th class="text-left p-2">ADP</th>
          <th class="text-left p-2">injury</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <script type="module">
      import { FuzzySearch } from '../../src/core/search.js';
      import { normalizeInjuryStatus } from '../../src/core/schema.js';
      import { loadPlayersFromWorkspace, savePlayersToWorkspace } from '../../src/ui/dataManagement.js';

      const qEl = document.getElementById('q');
      const showDraftedEl = document.getElementById('showDrafted');
      const countEl = document.getElementById('count');
      const timeEl = document.getElementById('time');
      const perfHud = document.getElementById('perfHud');
      const hudAvgEl = document.getElementById('hudAvg');
      const hudP95El = document.getElementById('hudP95');
      const notice = document.getElementById('notice');
      const rowsEl = document.getElementById('rows');
      const posAllEl = document.getElementById('pos_all');
      const posEls = Array.from(document.querySelectorAll('input.pos'));

      let players = [];
      let search = null;
      let lastResults = [];
      let selectedIdx = -1;
      const PERF_HUD_ENABLED = (new URLSearchParams(location.search).get('hud') ?? '1') !== '0';
      let perfSamples = [];
      function normalizePos(p) {
        const s = String(p || '').toUpperCase();
        if (s === 'DEF') return 'DST';
        return s;
      }

      function selectedPositions() {
        if (posAllEl.checked) return new Set(['QB','RB','WR','TE','DST','K']);
        const set = new Set();
        for (const el of posEls) { if (el.checked) set.add(el.getAttribute('data-pos')); }
        // Fallback to all if none selected to avoid zero-results trap
        if (set.size === 0) return new Set(['QB','RB','WR','TE','DST','K']);
        return set;
      }

      function applyFilters(arr) {
        const showDrafted = !!showDraftedEl.checked;
        const allowed = selectedPositions();
        return arr.filter(p => {
          if (!showDrafted && p.drafted) return false;
          const pos = normalizePos(p.position);
          return allowed.has(pos);
        });
      }

      function bestComparator(a, b) {
        const adpA = getAdp(a); const adpB = getAdp(b);
        if (adpA !== '' && adpB !== '' && Number.isFinite(Number(adpA)) && Number.isFinite(Number(adpB))) {
          return Number(adpA) - Number(adpB); // lower ADP first
        }
        const ptsA = Number(a.points); const ptsB = Number(b.points);
        if (Number.isFinite(ptsA) && Number.isFinite(ptsB)) return ptsB - ptsA; // higher points first
        return String(a.name).localeCompare(String(b.name));
      }


      function normalizePlayers(arr) { return (arr || []).map(p => ({ ...p, drafted: !!p.drafted })); }
      function getAdp(p) { return (p?.marketData?.adp ?? p?.adp) ?? ''; }

      const STATUS_LABELS = ['HEALTHY','Q','D','O','IR','PUP','NA'];

      function injuryClass(code) {
        const c = normalizeInjuryStatus(code);
        if (c === 0) return 'text-emerald-700';   // HEALTHY
        if (c === 1) return 'text-yellow-700';    // Q
        if (c === 2) return 'text-orange-700';    // D
        if (c === 3) return 'text-rose-700';      // O
        if (c === 4) return 'text-rose-700';      // IR
        if (c === 5) return 'text-rose-700';      // PUP
        return 'text-slate-500';                  // NA
      }

      function escapeHtml(str) {
        return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[s]));
      }

      function highlightName(name, query) {
        const n = String(name || '');
        const q = String(query || '').trim();
        if (!q) return escapeHtml(n);
        const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const re = new RegExp(esc, 'i');
        const m = n.match(re);
        if (!m) return escapeHtml(n);
        const i = m.index; const j = i + m[0].length;
        return escapeHtml(n.slice(0, i)) + '<mark>' + escapeHtml(n.slice(i, j)) + '</mark>' + escapeHtml(n.slice(j));
      }

      function reload() {
        // During parent dashboard drags, suppress reloads to avoid flicker/errors
        if (window.parent && window.parent.document.body.classList.contains('dash-drag-active')) {
          return;
        }
        players = normalizePlayers(loadPlayersFromWorkspace());
        search = new FuzzySearch(players);
        if (!players.length) { notice.textContent = 'No players in workspace. Use T-013 to import data, then return here.'; }
        else { notice.textContent = ''; }
        selectedIdx = -1;
        runSearch();
      }

      // Simple debounce wrapper
      let debounceTimer = null;
      function debounce(fn, delay) {
        return function(...args) {
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(() => fn.apply(this, args), delay);
        };
      }

      const runSearchDebounced = debounce(runSearchCore, 150);

      function runSearch() {
        runSearchDebounced();
      }

      function runSearchCore() {
        const q = qEl.value || '';
        const t0 = performance.now();
        let results;
        if (q.trim().length === 0) {
          // Default view: best remaining
          results = applyFilters(players).slice().sort(bestComparator);
        } else {
          const drafted = showDraftedEl.checked ? 'all' : 'undrafted';
          results = applyFilters(search.search(q, { drafted }));
        }
        const t1 = performance.now();
        lastResults = results;
        render(results, q);
        countEl.textContent = String(results.length);
        timeEl.textContent = (t1 - t0).toFixed(1);
        recordPerf(t1 - t0);
      }

      function render(results, query) {
        rowsEl.innerHTML = '';
        if (!results.length) {
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.colSpan = 7; td.className = 'p-3 text-slate-500 italic';
          td.textContent = 'No results';
          tr.appendChild(td); rowsEl.appendChild(tr); return;
        }
        const max = 50;
        const slice = results.slice(0, max);
        slice.forEach((r, idx) => {
          const tr = document.createElement('tr');
          tr.setAttribute('role', 'row');
          tr.setAttribute('aria-selected', String(idx === selectedIdx));
          // Read-only view
          tr.innerHTML = `
            <td class="p-2 border-t name"></td>
            <td class="p-2 border-t">${escapeHtml(r.team ?? '')}</td>
            <td class="p-2 border-t">${escapeHtml(r.position ?? '')}</td>
            <td class="p-2 border-t">${escapeHtml(getAdp(r))}</td>
            <td class="p-2 border-t ${injuryClass(r.injuryStatus)}">${STATUS_LABELS[normalizeInjuryStatus(r.injuryStatus)]}</td>`;
          const nameTd = tr.querySelector('.name');
          nameTd.innerHTML = highlightName(r.name, query);
          tr.addEventListener('mouseenter', () => showHoverPreview(r));
          tr.addEventListener('mouseleave', hideHoverPreview);
          tr.addEventListener('click', (ev) => {
            // Update selection state so row highlights identically to keyboard
            selectedIdx = idx;
            render(results, query);
            // Commit selection (same behavior as Enter/Space)
            selectRow(r);
          });
          rowsEl.appendChild(tr);
        });
      }

      function selectRow(p) {
        const msg = { type: 'player.selected', payload: { id: p?.id ?? '', name: p?.name ?? '' } };
        try { window.parent?.postMessage(msg, '*'); } catch {}
      }

      // Lightweight hover preview HUD (name, team, position, points)
      let hoverDiv = null;
      function ensureHover() {
        if (!hoverDiv) {
          hoverDiv = document.createElement('div');
          hoverDiv.className = 'fixed z-50 bg-slate-800 text-white text-xs px-2 py-1 rounded shadow pointer-events-none';
          document.body.appendChild(hoverDiv);
        }
      }
      function showHoverPreview(p) {
        ensureHover();
        const pts = (p && Number.isFinite(Number(p.points))) ? Number(p.points).toFixed(1) : '-';
        hoverDiv.textContent = `${p.name} · ${p.team} · ${p.position} · pts ${pts}`;
        document.addEventListener('mousemove', positionHover, { passive: true });
      }
      function hideHoverPreview() {
        if (hoverDiv) hoverDiv.style.display = 'none';
        document.removeEventListener('mousemove', positionHover);
      }
      function positionHover(e) {
        if (!hoverDiv) return;
        hoverDiv.style.display = 'block';
        hoverDiv.style.left = `${e.clientX + 12}px`;
        hoverDiv.style.top = `${e.clientY + 12}px`;
      }

      function toggleDraftedById(id) {
        const idx = players.findIndex(p => String(p.id || p.name) === String(id));
        if (idx < 0) return;
        players[idx].drafted = !players[idx].drafted;
        const res = savePlayersToWorkspace(players.map(({ __source, ...rest }) => rest));
        if (!res.ok) { alert('Failed to save drafted flag'); return; }
        // Avoid triggering parent re-render mid-drag; only re-run search locally
        search = new FuzzySearch(players);
        runSearch();
      }

      // Keyboard navigation: ↑/↓ to move, Enter/Space to select
      function onKeyDown(e) {
        const total = lastResults.length;
        if (!['ArrowDown','ArrowUp','Enter',' '].includes(e.key)) return;
        if (!total) return;
        if (e.key === 'ArrowDown') { selectedIdx = Math.min(total - 1, selectedIdx + 1); e.preventDefault(); render(lastResults, qEl.value || ''); return; }
        if (e.key === 'ArrowUp') { selectedIdx = Math.max(0, selectedIdx - 1); e.preventDefault(); render(lastResults, qEl.value || ''); return; }
       if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          const sel = lastResults[selectedIdx >= 0 ? selectedIdx : 0];
          const id = sel?.id || sel?.name;
          if (id != null) {
            const p = players.find(pp => String(pp.id || pp.name) === String(id));
            selectRow(p);
          }
        }
      }

      qEl.addEventListener('input', () => { selectedIdx = -1; runSearch(); });
      showDraftedEl.addEventListener('change', () => { selectedIdx = -1; runSearch(); });
      posAllEl.addEventListener('change', () => {
        if (posAllEl.checked) {
          // When All is checked, uncheck all individual positions
          posEls.forEach(el => { el.checked = false; });
        }
        selectedIdx = -1; runSearch();
      });
      posEls.forEach(el => el.addEventListener('change', (e) => {
        const target = e.currentTarget;
        if (target.checked) {
          if (posAllEl.checked) {
            // First selection after All: unselect All and keep only this
            posAllEl.checked = false;
            posEls.forEach(other => { if (other !== target) other.checked = false; });
          }
        }
        selectedIdx = -1; runSearch();
      }));
      document.addEventListener('keydown', onKeyDown);
       document.getElementById('reload').addEventListener('click', reload);
      document.getElementById('resetDraft').addEventListener('click', () => {
        try {
          // Clear picks and drafted flags in workspace
          const sRaw = window.localStorage.getItem('workspace::state');
          let st = sRaw ? JSON.parse(sRaw) : { draft: { picks: [] } };
          st.draft = { picks: [] };
          window.localStorage.setItem('workspace::state', JSON.stringify(st));
          const pRaw = window.localStorage.getItem('workspace::players');
          const players = pRaw ? JSON.parse(pRaw).map(r => ({ ...r, drafted: false })) : [];
          window.localStorage.setItem('workspace::players', JSON.stringify(players));
          alert('Draft reset (dev only).');
          reload();
          try { window.parent?.dispatchEvent(new CustomEvent('workspace:state-changed')); } catch {}
          try { window.parent?.dispatchEvent(new CustomEvent('workspace:players-changed')); } catch {}
        } catch (e) {
          console.error('Reset draft failed', e);
          alert('Reset failed');
        }
      });

      // Dev: Run Calcs for all players and store to localStorage for debug
      document.getElementById('runCalcs').addEventListener('click', async () => {
        try {
          // lazy import analysis VM bits to avoid bloat
          const [{ calculatePlayerVBD }, { baselineForPosition }] = await Promise.all([
            import('../../src/core/vbd.js'),
            import('../../src/core/vbd.js')
          ]);
          const { stdDev } = await import('../../src/core/tiers.js');
          const settingsMod = await import('../../src/ui/settings.js');
          const settings = settingsMod.loadSettings();
          const league = { teams: Number(settings.teams||12), starters: settings.roster||{} };
          const all = normalizePlayers(loadPlayersFromWorkspace());
          const withVbd = calculatePlayerVBD(all, league);
          const byPos = new Map();
          withVbd.forEach(p => {
            const k = String(p.position||'').toUpperCase();
            if (!byPos.has(k)) byPos.set(k, []);
            byPos.get(k).push(p);
          });
          const out = withVbd.map(p => {
            const baseline = baselineForPosition(withVbd, String(p.position||''), league);
            const vals = (byPos.get(String(p.position||'').toUpperCase())||[]).map(x => Number(x.vbd||0));
            const sigma = stdDev(vals);
            const z = sigma > 0 ? (Number(p.vbd||0) / sigma) : 0;
            return { id: p.id, name: p.name, team: p.team, position: p.position, points: p.points, vbd: Number(p.vbd||0), baseline, zScore: Number.isFinite(z)?Number(z.toFixed(2)):0 };
          });
          window.localStorage.setItem('debug::analysis_table', JSON.stringify(out));
          alert(`Computed ${out.length} rows to debug::analysis_table`);
        } catch (e) {
          console.error('Run Calcs failed', e);
          alert('Run Calcs failed');
        }
      });
      // If the parent toggles dash-drag-active, avoid auto reloads; we check inside reload()

      // Reflect external changes to workspace players (e.g., draft widget updates)
      window.addEventListener('storage', (e) => {
        try {
          if (!e) return;
          // Vite dev server may prepend origin; use includes
          if (String(e.key || '').includes('workspace::players')) reload();
          if (String(e.key || '').includes('workspace::state')) reload();
        } catch {}
      });

      // Initial
      reload();

      // Perf HUD helpers
      function recordPerf(ms) {
        if (!PERF_HUD_ENABLED) return;
        if (!Number.isFinite(ms)) return;
        perfHud.classList.remove('hidden');
        perfSamples.push(ms);
        if (perfSamples.length > 200) perfSamples.shift();
        const avg = perfSamples.reduce((a, b) => a + b, 0) / perfSamples.length;
        const sorted = [...perfSamples].sort((a, b) => a - b);
        const idx = Math.max(0, Math.min(sorted.length - 1, Math.floor(sorted.length * 0.95) - 1));
        const p95 = sorted[idx] ?? ms;
        hudAvgEl.textContent = avg.toFixed(1);
        hudP95El.textContent = p95.toFixed(1);
      }

      document.getElementById('hudReset').addEventListener('click', () => {
        perfSamples = [];
        hudAvgEl.textContent = '-';
        hudP95El.textContent = '-';
      });
    </script>
  </body>
  </html>
