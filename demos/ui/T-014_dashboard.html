<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>T-014 Dashboard Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Collapsed panel styling */
      .panel.collapsed { min-height: 2.5rem !important; }
      .panel.collapsed .panel-body { display: none; }
      .panel .panel-header { user-select: none; }
      .panel.active .panel-header { background-color: #ecfdf5; /* emerald-50 */ border-color: #a7f3d0; }
      .panel.collapsed .panel-header { background-color: #f1f5f9; /* slate-100 */ color: #64748b; }
      /* Grid sizing */
      #dashGrid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      /* Resizer */
      .panel { position: relative; }
      /* Fullscreen */
      .panel.fullscreen { position: fixed !important; inset: 0 !important; z-index: 50 !important; width: 100vw !important; height: 100vh !important; border-radius: 0 !important; }
      .panel.fullscreen .panel-body { height: calc(100vh - 3rem); overflow: auto; }
    </style>
  </head>

    <!--<main class="max-w-7xl mx-auto px-4 py-4" data-dashboard-root> -->

        </div>
        <!-- <div id="dashGrid" data-grid class="grid gap-4 h-[70vh]"> -->
        <div id="dashGrid" data-grid class="grid gap-4 h-[calc(100vh-8rem)]">
          <!-- Panel: Search & Select (fixed full width) -->
          <div class="panel active rounded border bg-white overflow-hidden flex flex-col" data-panel="search" data-size="l" data-collapsed="false" data-col="1" data-row="1" data-w="3" data-h="6">

          </div>

          <!-- Panel: Player Analysis (placeholder) -->
          <div class="panel active rounded border bg-white overflow-hidden flex flex-col" data-panel="analysis" data-size="m" data-collapsed="false" data-col="1" data-row="7" data-w="2" data-h="3">
            <div class="panel-header px-3 py-2 border-b font-medium flex items-center gap-2 cursor-pointer">

          <div class="panel active rounded border bg-white overflow-hidden flex flex-col" data-panel="tiers" data-size="m" data-collapsed="false" data-col="3" data-row="7" data-w="1" data-h="3">

          <!-- Panel: My Roster (placeholder) -->
          <div class="panel active rounded border bg-white overflow-hidden flex flex-col" data-panel="roster" data-size="s" data-collapsed="false" data-col="1" data-row="10" data-w="1" data-h="3">
            <div class="panel-header px-3 py-2 border-b font-medium flex items-center gap-2 cursor-pointer">
              <span class="mr-auto">My Roster</span>
              <div class="flex items-center gap-1 text-xs">
                <span class="text-slate-500 ml-2">W</span>
                <button class="btn-h-minus px-2 py-1 border rounded">−</button>
                <button class="btn-h-plus px-2 py-1 border rounded">+</button>
                <span class="text-slate-500 ml-2">H</span>

          </div>

          <!-- Panel: Budget Tracker (placeholder) -->
          <div class="panel active rounded border bg-white overflow-hidden flex flex-col" data-panel="budget" data-size="s" data-collapsed="false" data-col="2" data-row="10" data-w="1" data-h="3">
            <div class="panel-header px-3 py-2 border-b font-medium flex items-center gap-2 cursor-pointer">
              <span class="mr-auto">Budget Tracker</span>
              <div class="flex items-center gap-1 text-xs">
                <button class="btn-left px-2 py-1 border rounded" title="Move left">←</button>
                <button class="btn-right px-2 py-1 border rounded" title="Move right">→</button>
                <button class="btn-up px-2 py-1 border rounded" title="Move up">↑</button>
                <button class="btn-down px-2 py-1 border rounded" title="Move down">↓</button>
                <span class="text-slate-500 ml-2">W</span>
                <button class="btn-h-minus px-2 py-1 border rounded">−</button>
                <button class="btn-h-plus px-2 py-1 border rounded">+</button>
                <span class="text-slate-500 ml-2">H</span>
                <button class="btn-v-minus px-2 py-1 border rounded">−</button>
                <button class="btn-v-plus px-2 py-1 border rounded">+</button>

            </div>
            <div class="panel-body p-3 grow">

      <section id="view-settings" class="view hidden">
        <div class="rounded border bg-white p-3">
          <iframe src="./T-012_settings.html" class="w-full h-[36rem] border rounded"></iframe>
        </div>
      </section>

      <section id="view-data" class="view hidden">
        <div class="rounded border bg-white p-3">
          <iframe src="./T-013_data_management.html" class="w-full h-[32rem] border rounded"></iframe>
        </div>
      </section>

      <section id="view-debug" class="view hidden">
        <div class="rounded border bg-white p-3">
          <iframe src="./T-014a_debug.html" class="w-full h-[36rem] border rounded"></iframe>
          <p class="text-xs text-slate-600 mt-2">Debug tab is development-only and excluded from production builds.</p>
        </div>
      </section>
    </main>

    <script type="module">
      import { initDashboard } from '/src/ui/dashboard.js';
      const tabs = Array.from(document.querySelectorAll('button.tab'));
      const views = {
        dashboard: document.getElementById('view-dashboard'),
        settings: document.getElementById('view-settings'),
        data: document.getElementById('view-data'),
        debug: document.getElementById('view-debug')
      };
      const loading = document.getElementById('loading');

      function setActive(tab) {
        tabs.forEach(b => b.classList.toggle('bg-slate-200', b.dataset.tab === tab));
        Object.entries(views).forEach(([k, el]) => el.classList.toggle('hidden', k !== tab));
      }

      tabs.forEach(btn => btn.addEventListener('click', () => {
        loading.classList.remove('hidden');
        setTimeout(() => {
          setActive(btn.dataset.tab);
          loading.classList.add('hidden');
        }, 250); // small simulated loading
      }));

      // Default
      setActive('dashboard');

      // ===== MVP panel controls: collapse, resize, drag/snap (simple) =====
      const grid = document.getElementById('dashGrid');
      const LS_KEY = 'dashboardLayoutV2';
      const COLS = 3;   // Fixed 3 columns per spec
      const ROW_H = 96; // px (6rem)
      const rowCollapse = {}; // rowIndex -> collapsed boolean

      function applyGridPosition(panel) {
        const col = clamp(1, COLS, Number(panel.dataset.col || 1));
        const row = Math.max(1, Number(panel.dataset.row || 1));
        const w = clamp(1, COLS - col + 1, Number(panel.dataset.w || 1));
        const h = Math.max(1, Number(panel.dataset.h || 1));
        panel.style.gridColumn = `${col} / span ${w}`;
        // If a row is collapsed, force height to 1 row for that row and trim any overflow into it
        const rowsSpanned = effectiveRows(panel, row, h);
        panel.style.gridRow = `${row} / span ${rowsSpanned}`;
      }

      function effectiveRows(panel, startRow, h) {
        // Trim height if any overlapped row is collapsed
        let span = h;
        for (let r = startRow; r < startRow + h; r += 1) {
          if (rowCollapse[r]) { span = Math.min(span, Math.max(1, r - startRow)); break; }
        }
        return Math.max(1, span);
      }

      function trimHeightForCollapsed(panel) {
        // Permanently shrink panel.h if it overlaps collapsed rows
        const startRow = Number(panel.dataset.row || 1);
        let newH = Number(panel.dataset.h || 1);
        for (let r = startRow; r < startRow + newH; r += 1) {
          if (rowCollapse[r]) { newH = Math.max(1, r - startRow); break; }
        }
        if (newH !== Number(panel.dataset.h)) {
          panel.dataset.h = newH;
        }
      }

      function applyCollapsed(panel, collapsed) {
        panel.dataset.collapsed = String(collapsed);
        panel.classList.toggle('collapsed', collapsed);
        panel.classList.toggle('active', !collapsed);
      }

      function saveLayout() {
        const panels = Array.from(grid.querySelectorAll('.panel'));
        const state = panels.map(p => ({ id: p.dataset.panel, col: Number(p.dataset.col), row: Number(p.dataset.row), w: Number(p.dataset.w), h: Number(p.dataset.h), collapsed: p.dataset.collapsed === 'true' }));
        const rows = { ...rowCollapse };
        localStorage.setItem(LS_KEY, JSON.stringify({ panels: state, rows }));
      }

      function loadLayout() {
        try {
          const raw = localStorage.getItem(LS_KEY);
          if (!raw) return;
          const payload = JSON.parse(raw);
          const states = Array.isArray(payload) ? payload : payload.panels;
          if (!Array.isArray(states)) return;
          Object.assign(rowCollapse, payload.rows || {});
          states.forEach(s => {
            const p = grid.querySelector(`.panel[data-panel="${s.id}"]`);
            if (!p) return;
            p.dataset.col = s.col; p.dataset.row = s.row; p.dataset.w = s.w; p.dataset.h = s.h;
            applyGridPosition(p);
            applyCollapsed(p, !!s.collapsed);
          });
          applyRowStyles();
        } catch {}
      }

      function wirePanelControls(panel) {
        // Drag-and-drop disabled in simplified mode
        panel.setAttribute('draggable', 'false');
        const header = panel.querySelector('.panel-header');
        if (header) header.addEventListener('click', () => {
          const collapsed = panel.dataset.collapsed === 'true' ? false : true;
          applyCollapsed(panel, collapsed);
          // Toggle row collapse for the top row of this panel
          const r = Number(panel.dataset.row || 1);
          rowCollapse[r] = collapsed;
          applyRowStyles();
          // After collapsing a row, trim panels that overlap this row
          Array.from(grid.querySelectorAll('.panel')).forEach(p => { trimHeightForCollapsed(p); applyGridPosition(p); });
          saveLayout();
        });
        // Width/Height buttons
        const hMinus = panel.querySelector('.btn-h-minus');
        const hPlus = panel.querySelector('.btn-h-plus');
        const vMinus = panel.querySelector('.btn-v-minus');
        const vPlus = panel.querySelector('.btn-v-plus');
        if (hMinus) hMinus.addEventListener('click', (ev) => { ev.stopPropagation(); adjustSize(panel, -1, 0); });
        if (hPlus) hPlus.addEventListener('click', (ev) => { ev.stopPropagation(); adjustSize(panel, +1, 0); });
        if (vMinus) vMinus.addEventListener('click', (ev) => { ev.stopPropagation(); adjustSize(panel, 0, -1); });
        if (vPlus) vPlus.addEventListener('click', (ev) => { ev.stopPropagation(); adjustSize(panel, 0, +1); });
        const expandBtn = panel.querySelector('.btn-expand');
        if (expandBtn) expandBtn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const isFull = panel.classList.contains('fullscreen');
          if (isFull) {
            panel.classList.remove('fullscreen');
            expandBtn.textContent = 'Expand';
            // restore grid position
            applyGridPosition(panel);
          } else {
            panel.classList.add('fullscreen');
            expandBtn.textContent = 'Close';
            panel.style.gridColumn = '';
            panel.style.gridRow = '';
          }
        });

        // Dragging disabled; no resizer hooks
        // Move buttons
        const btnL = panel.querySelector('.btn-left');
        const btnR = panel.querySelector('.btn-right');
        const btnU = panel.querySelector('.btn-up');
        const btnD = panel.querySelector('.btn-down');
        if (btnL) btnL.addEventListener('click', (ev) => { ev.stopPropagation(); movePanel(panel, -1, 0); });
        if (btnR) btnR.addEventListener('click', (ev) => { ev.stopPropagation(); movePanel(panel, +1, 0); });
        if (btnU) btnU.addEventListener('click', (ev) => { ev.stopPropagation(); movePanel(panel, 0, -1); });
        if (btnD) btnD.addEventListener('click', (ev) => { ev.stopPropagation(); movePanel(panel, 0, +1); });
      }

      function startDrag(e, panel) {
        if (panel.classList.contains('fullscreen')) return;
        const start = getPanelState(panel);
        const origin = grid.getBoundingClientRect();
        const offsetCols = Math.round(((e.clientX - origin.left) / (origin.width / COLS))) - start.col;
        const offsetRows = Math.round(((e.clientY - origin.top) / ROW_H)) - start.row;
        function onMove(ev) {
          const cell = pointToCell(ev.clientX, ev.clientY);
          const col = clamp(1, COLS - start.w + 1, cell.col - offsetCols);
          const row = Math.max(1, cell.row - offsetRows);
          panel.dataset.col = col; panel.dataset.row = row;
          applyGridPosition(panel);
        }
        function onUp(ev) {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          // finalize and handle swap if needed
          const p = getPanelState(panel);
          if (checkOverlap(panel)) {
            // try swap with first overlapping of same size
            const other = findOverlapSameSize(panel);
            if (other) swapPanels(panel, other); else { restorePanel(panel, start); }
          }
          saveLayout();
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      }

      // Drag resizer removed; resizing via buttons with strict grid enforcement

      function adjustSize(panel, dW, dH) {
        const s = getPanelState(panel);
        let newW = clamp(1, COLS - s.col + 1, s.w + dW);
        let newH = Math.max(1, s.h + dH);
        // Enforce collapsed rows trimming
        for (let r = s.row; r < s.row + newH; r += 1) {
          if (rowCollapse[r]) { newH = Math.max(1, r - s.row); break; }
        }
        // Tentatively apply
        panel.dataset.w = newW; panel.dataset.h = newH; applyGridPosition(panel);
        if (checkOverlap(panel)) {
          // revert if overlap
          panel.dataset.w = s.w; panel.dataset.h = s.h; applyGridPosition(panel);
          return;
        }
        saveLayout();
      }

      function getPanelState(panel) {
        return { id: panel.dataset.panel, col: Number(panel.dataset.col), row: Number(panel.dataset.row), w: Number(panel.dataset.w), h: Number(panel.dataset.h) };
      }
      function rectOf(panel) {
        const p = getPanelState(panel);
        return { left: p.col, right: p.col + p.w - 1, top: p.row, bottom: p.row + p.h - 1 };
      }
      function overlaps(a, b) {
        // Strict cell overlap detection; no partials (integral grid only)
        return !(a.left > b.right || a.right < b.left || a.top > b.bottom || a.bottom < b.top);
      }
      function checkOverlap(panel) {
        const ra = rectOf(panel);
        const others = Array.from(grid.querySelectorAll('.panel')).filter(x => x !== panel);
        return others.some(o => overlaps(ra, rectOf(o)));
      }
      function findOverlapSameSize(panel) {
        const ra = rectOf(panel); const pa = getPanelState(panel);
        const others = Array.from(grid.querySelectorAll('.panel')).filter(x => x !== panel);
        return others.find(o => { const rb = rectOf(o); const pb = getPanelState(o); return overlaps(ra, rb) && pb.w === pa.w && pb.h === pa.h; });
      }
      function swapPanels(a, b) {
        const pa = getPanelState(a); const pb = getPanelState(b);
        a.dataset.col = pb.col; a.dataset.row = pb.row;
        b.dataset.col = pa.col; b.dataset.row = pa.row;
        applyGridPosition(a); applyGridPosition(b);
      }
      function restorePanel(panel, s) { panel.dataset.col = s.col; panel.dataset.row = s.row; panel.dataset.w = s.w; panel.dataset.h = s.h; applyGridPosition(panel); }

      function movePanel(panel, dCol, dRow) {
        const s = getPanelState(panel);
        const newCol = clamp(1, COLS - s.w + 1, s.col + dCol);
        const newRow = Math.max(1, s.row + dRow);
        const prev = { ...s };
        panel.dataset.col = newCol; panel.dataset.row = newRow; applyGridPosition(panel);
        if (checkOverlap(panel)) {
          const other = findOverlapSameSize(panel);
          if (other) swapPanels(panel, other); else restorePanel(panel, prev);
        }
        saveLayout();
      }

      function pointToCell(clientX, clientY) {
        const origin = grid.getBoundingClientRect();
        const col = clamp(1, COLS, Math.ceil((clientX - origin.left) / (origin.width / COLS)));
        const row = Math.max(1, Math.ceil((clientY - origin.top) / ROW_H));
        return { col, row };
      }
      function clamp(min, max, v) { return Math.max(min, Math.min(max, v)); }

      function applyRowStyles() {
        // Apply CSS row sizes by injecting per-row track sizes
        const maxRow = Math.max(...Array.from(grid.querySelectorAll('.panel')).map(p => Number(p.dataset.row || 1) + Number(p.dataset.h || 1)));
        // Build template rows: collapsed rows get 2.5rem, others 6rem
        const sizes = [];
        for (let r = 1; r <= maxRow; r += 1) sizes.push(rowCollapse[r] ? '2.5rem' : '6rem');
        grid.style.gridAutoRows = '6rem';
        grid.style.gridTemplateRows = sizes.join(' ');
        // Re-apply positions to trim spans
        Array.from(grid.querySelectorAll('.panel')).forEach(p => { trimHeightForCollapsed(p); applyGridPosition(p); });
      }

      // Replace legacy layout with new widget engine
      const root = document.querySelector('[data-dashboard-root]');
      initDashboard(root);
      // Mount inline analysis and tiers when present in demo (non-widget path for HITL)
      (async () => {
        try {
          const ana = document.getElementById('analysisMount');
          if (ana) {
            const mod = await import('/src/ui/analysis.js');
            mod.initAnalysisWidget(ana);
          }
        } catch {}
        try {
          const t = document.getElementById('tiersMount');
          if (t) {
            const mod = await import('/src/ui/tiersViz.js');
            mod.initTiersWidget(t);
          }
        } catch {}
      })();
    </script>
  </body>
