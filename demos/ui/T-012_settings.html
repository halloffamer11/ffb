<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T-012 League Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-900 p-6">
    <h1 class="text-2xl font-semibold mb-4">T-012 League Settings</h1>

    <form id="settingsForm" class="space-y-4 max-w-xl">
      <div class="grid grid-cols-2 gap-4">
        <label class="block">Teams
          <input name="teams" type="number" min="8" max="14" value="12" class="border p-2 w-full" />
        </label>
        <label class="block">Budget
          <input name="budget" type="number" min="50" max="1000" value="200" class="border p-2 w-full" />
        </label>
      </div>

      <fieldset class="border p-3 rounded">
        <legend class="font-medium">Roster Starters</legend>
        <div class="grid grid-cols-4 gap-3">
          <label>QB <input name="r_QB" type="number" value="1" class="border p-1 w-16" /></label>
          <label>RB <input name="r_RB" type="number" value="2" class="border p-1 w-16" /></label>
          <label>WR <input name="r_WR" type="number" value="2" class="border p-1 w-16" /></label>
          <label>TE <input name="r_TE" type="number" value="1" class="border p-1 w-16" /></label>
          <label>K <input name="r_K" type="number" value="0" class="border p-1 w-16" /></label>
          <label>DST <input name="r_DST" type="number" value="0" class="border p-1 w-16" /></label>
          <label>BENCH <input name="r_BENCH" type="number" value="6" class="border p-1 w-16" /></label>
        </div>
      </fieldset>

      <fieldset class="border p-3 rounded">
        <legend class="font-medium">Flex Slots</legend>
        <div class="flex flex-wrap gap-2 mb-2">
          <button type="button" data-flex-preset="NONE" class="px-2 py-1 border rounded">None</button>
          <button type="button" data-flex-preset="WR_TE" class="px-2 py-1 border rounded">WR/TE</button>
          <button type="button" data-flex-preset="RB_WR" class="px-2 py-1 border rounded">RB/WR</button>
          <button type="button" data-flex-preset="RB_WR_TE" class="px-2 py-1 border rounded">RB/WR/TE</button>
          <button type="button" data-flex-preset="SUPERFLEX" class="px-2 py-1 border rounded">Superflex (QB+)</button>
        </div>
        <div id="flexSlots" class="space-y-1"></div>
        <button id="addFlexSlot" type="button" class="mt-2 px-3 py-2 rounded border">Add Flex Slot</button>
      </fieldset>

      <div class="grid grid-cols-2 gap-4">
        <label class="block">Scoring Preset
          <select name="scoringPreset" class="border p-2 w-full">
            <option value="PPR">PPR</option>
            <option value="HALF">Half PPR</option>
            <option value="STD">Standard</option>
            <option value="CUSTOM">Custom</option>
          </select>
        </label>
        <label class="block">Keeper Mode
          <input name="keeperMode" type="checkbox" class="ml-2" />
        </label>
      </div>

      <fieldset class="border p-3 rounded">
        <legend class="font-medium">Scoring Overrides (optional)</legend>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
          <label>Pass yds / pt <input name="s_passYdsPerPt" type="number" step="0.1" class="border p-1 w-full" placeholder="25" /></label>
          <label>Pass TDs <input name="s_passTds" type="number" step="0.1" class="border p-1 w-full" placeholder="4" /></label>
          <label>INT <input name="s_passInt" type="number" step="0.1" class="border p-1 w-full" placeholder="-2" /></label>
          <label>Rush yds / pt <input name="s_rushYdsPerPt" type="number" step="0.1" class="border p-1 w-full" placeholder="10" /></label>
          <label>Rush TDs <input name="s_rushTds" type="number" step="0.1" class="border p-1 w-full" placeholder="6" /></label>
          <label>REC <input name="s_rec" type="number" step="0.1" class="border p-1 w-full" placeholder="1 (PPR)" /></label>
          <label>Rec yds / pt <input name="s_recYdsPerPt" type="number" step="0.1" class="border p-1 w-full" placeholder="10" /></label>
          <label>Rec TDs <input name="s_recTds" type="number" step="0.1" class="border p-1 w-full" placeholder="6" /></label>
          <label>Fumbles <input name="s_fumbles" type="number" step="0.1" class="border p-1 w-full" placeholder="-2" /></label>
        </div>
        <div class="mt-2 text-xs text-slate-600">Leave blank to use the scoring preset defaults.</div>
      </fieldset>

      <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
        <label class="block">Minimum Bid
          <input name="minBid" type="number" min="1" value="1" class="border p-2 w-full" />
        </label>
        <label class="block">Rounds
          <input name="rounds" type="number" min="1" value="16" class="border p-2 w-full" />
        </label>
        <label class="block">Draft Type
          <select name="draftType" class="border p-2 w-full">
            <option value="SNAKE">Snake</option>
            <option value="LINEAR">Linear</option>
          </select>
        </label>
        <label class="block">Enable IDP
          <input name="idpEnabled" type="checkbox" class="ml-2" />
        </label>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <h3 class="font-medium">Owners & Draft Order</h3>
          <div class="space-x-2">
            <button id="resetOwners" type="button" class="px-3 py-2 rounded bg-rose-600 text-white">Reset Owners</button>
          </div>
        </div>
        <table class="min-w-full bg-white rounded border text-sm mt-2">
          <thead class="bg-slate-100"><tr><th class="text-left p-2 w-24">Draft Order</th><th class="text-left p-2">Team Name</th><th class="text-left p-2">Owner Name</th></tr></thead>
          <tbody id="ownersGrid"></tbody>
        </table>
      </div>

      <div id="errors" class="text-rose-600 whitespace-pre-wrap"></div>
      <button type="submit" class="px-4 py-2 rounded bg-blue-600 text-white">Save Settings</button>
    </form>

    <h2 class="text-xl font-medium mt-6">Summary</h2>
    <pre id="summary" class="bg-white border rounded p-3 text-sm overflow-auto"></pre>

    

    <script type="module">
      import { attachSettingsForm, regenerateOwnersGrid } from '../../src/ui/settings.js';
      const form = document.getElementById('settingsForm');
      attachSettingsForm('settingsForm', 'summary', 'errors');
      document.getElementById('resetOwners').addEventListener('click', () => {
        const teams = Number(form.teams.value || 12);
        regenerateOwnersGrid(form, teams, true);
      });
    </script>
  </body>
  </html>
